name: Generate Algebra Exam Correction & Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Run every day at 8:00 AM UTC

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script to Query Google Drive and Groq
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python main.py

      - name: Commit and Push docs/ directory
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/index.html
          git commit -m "Update Maths Exam Correction HTML" || echo "No changes to commit"
          git push origin main
